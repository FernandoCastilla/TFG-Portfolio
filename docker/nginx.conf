worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        root /var/www/html/public;
        index index.php;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # Ruta bajo subdirectorio /portfolio/ — quita el prefijo antes de pasar a PHP
        # Esto permite que el proxy externo haga ProxyPass /portfolio/ http://...:8080/portfolio/
        location /portfolio/ {
            alias /var/www/html/public/;
            try_files $uri $uri/ @portfolio_php;
        }

        location @portfolio_php {
            rewrite ^/portfolio/(.*)$ /$1 break;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_param  REQUEST_URI     /portfolio/$1;
            include        fastcgi_params;
        }

        # Ruta raíz — acceso directo por puerto 8080
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}